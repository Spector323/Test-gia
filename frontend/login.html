<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Конференции.РФ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">Конференции.РФ</a>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="register.html">Регистрация</a></li>
                </ul>
            </nav>
            <button class="burger" id="burger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <section class="auth-section">
        <div class="container">
            <div class="auth-form">
                <h2>Вход в аккаунт</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login">Логин</label>
                        <input type="text" id="login" name="login" placeholder="Введите логин" required>
                        <span class="error-message" id="loginError"></span>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                        <span class="error-message" id="passwordError"></span>
                    </div>
                    <button type="submit" class="btn btn-full">Войти</button>
                </form>
                <p class="auth-link">Еще не зарегистрированы? <a href="register.html">Регистрация</a></p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>Конференции.РФ</h3>
                    <p>Бронирование помещений: аудитории, коворкинги, кинозалы</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Конференции.РФ. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="js/login.js"></script>
</body>
</html>
